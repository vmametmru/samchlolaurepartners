version: '3.9'

# Before starting: copy db/config.example.php to db/config.php and set
# host => 'db', user => 'partners_user', password => 'partners_pass',
# name => 'partners_db' to match the "db" service below. All other app
# settings (API keys, SMTP, etc.) are stored in the "settings" MySQL table.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: partners_db
      MYSQL_USER: partners_user
      MYSQL_PASSWORD: partners_pass
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - '8080:80'
    volumes:
      - .:/var/www/html

volumes:
  db_data:
