name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Lint PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done

      - name: Prepare artifacts
        run: |
          rm -rf artifact-package deployment-package.zip
          mkdir -p artifact-package
          cp -r public artifact-package/
          cp -r src artifact-package/
          cp -r bin artifact-package/
          cp -r database artifact-package/
          cp install.php artifact-package/
          cp .env.example artifact-package/
          [ -f README.md ] && cp README.md artifact-package/ || true

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: artifact-package/

      - name: Create release archive
        if: github.event_name == 'release'
        run: |
          (
            cd artifact-package
            zip -r ../deployment-package.zip .
          )

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: deployment-package.zip
