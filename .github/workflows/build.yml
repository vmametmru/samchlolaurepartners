name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Lint PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done

      - name: Set build timestamp
        id: ts
        run: echo "value=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts
        run: |
          rm -rf artifact-package deployment-package-*.zip
          mkdir -p artifact-package
          tar \
            --exclude='./.git' \
            --exclude='./artifact-package' \
            --exclude='./deployment-package-*.zip' \
            -cf - . | tar -xf - -C artifact-package
          # Runtime directories are gitignored (empty), but the app expects
          # them to exist, so create them in the package.
          mkdir -p artifact-package/files/storage/logs
          mkdir -p artifact-package/files/storage/cache

      - name: Verify package completeness
        run: |
          tmp_dir="$(mktemp -d)"
          find . \
            -path './.git' -prune -o \
            -path './artifact-package' -prune -o \
            -name 'deployment-package-*.zip' -prune -o \
            -type f -print | sed 's#^\./##' | sort > "$tmp_dir/source-files.txt"
          (
            cd artifact-package
            find . -type f -print | sed 's#^\./##' | sort
          ) > "$tmp_dir/package-files.txt"
          if ! diff -u "$tmp_dir/source-files.txt" "$tmp_dir/package-files.txt"; then
            echo "::error::Deployment package does not contain all repository files"
            exit 1
          fi

          required=".env.example .gitattributes .github .gitignore .htaccess assets bin db docker-compose.yml Dockerfile files files/controllers files/views images index.php install README.md"
          missing=""
          for path in $required; do
            if [ ! -e "artifact-package/$path" ]; then
              missing="$missing $path"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Deployment package is missing:$missing"
            exit 1
          fi
          echo "Deployment package contents:"
          ( cd artifact-package && find . | sort )

      - name: Create deployment zip
        env:
          BUILD_TS: ${{ steps.ts.outputs.value }}
        run: |
          (
            cd artifact-package
            zip -r "../deployment-package-${BUILD_TS}.zip" .
          )

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package-${{ steps.ts.outputs.value }}
          path: artifact-package/
          retention-days: 30

      - name: Attach zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: deployment-package-${{ steps.ts.outputs.value }}.zip
