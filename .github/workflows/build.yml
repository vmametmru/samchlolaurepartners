name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Lint PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done

      - name: Set build timestamp
        id: ts
        run: echo "value=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts
        run: |
          rm -rf artifact-package deployment-package-*.zip
          mkdir -p artifact-package
          # Export every tracked file (honouring .gitattributes export-ignore)
          # so the package always contains the full project tree, not a
          # hand-maintained subset that can silently drop directories.
          git archive --format=tar HEAD | tar -x -C artifact-package
          # Runtime directories are gitignored (empty), but the app expects
          # them to exist, so create them in the package.
          mkdir -p artifact-package/files/storage/logs
          mkdir -p artifact-package/files/storage/cache

      - name: Verify package completeness
        run: |
          required="index.php .htaccess .env.example assets files files/controllers files/views db install bin images"
          missing=""
          for path in $required; do
            if [ ! -e "artifact-package/$path" ]; then
              missing="$missing $path"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Deployment package is missing:$missing"
            exit 1
          fi
          echo "Deployment package contents:"
          ( cd artifact-package && find . | sort )

      - name: Create deployment zip
        env:
          BUILD_TS: ${{ steps.ts.outputs.value }}
        run: |
          (
            cd artifact-package
            zip -r "../deployment-package-${BUILD_TS}.zip" .
          )

      - name: Upload deployment zip
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package-${{ steps.ts.outputs.value }}
          path: deployment-package-${{ steps.ts.outputs.value }}.zip
          retention-days: 30

      - name: Attach zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: deployment-package-${{ steps.ts.outputs.value }}.zip
