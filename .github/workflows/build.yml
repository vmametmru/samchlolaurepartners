name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=packages/backend

      - name: Build frontend
        run: npm run build --workspace=packages/frontend

      - name: Prepare artifacts
        run: |
          rm -rf artifact-api artifact-dist
          mkdir -p artifact-api artifact-dist
          cp -r packages/backend/dist/. artifact-api/
          cp packages/backend/package.json artifact-api/
          cp -r packages/frontend/dist/. artifact-dist/

      - name: Upload api artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: artifact-api/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: artifact-dist/

      - name: Create release archives
        if: github.event_name == 'release'
        run: |
          (
            cd artifact-api
            zip -r ../api.zip .
          )
          (
            cd artifact-dist
            zip -r ../dist.zip .
          )

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            api.zip
            dist.zip
