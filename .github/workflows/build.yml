name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=packages/backend

      - name: Build frontend
        run: npm run build --workspace=packages/frontend

      - name: Prepare artifacts
        run: |
          rm -rf artifact-package
          mkdir -p artifact-package/api
          cp -r packages/frontend/dist/. artifact-package/
          cp -r packages/backend/dist/. artifact-package/api/
          cp packages/backend/package.json artifact-package/api/

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: artifact-package/

      - name: Create release archive
        if: github.event_name == 'release'
        run: |
          (
            cd artifact-package
            zip -r ../deployment-package.zip .
          )

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: deployment-package.zip
